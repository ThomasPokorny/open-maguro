services:
  postgres:
    image: postgres:17-alpine
    container_name: open-maguro-db
    environment:
      POSTGRES_USER: maguro
      POSTGRES_PASSWORD: maguro
      POSTGRES_DB: open_maguro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maguro -d open_maguro"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
